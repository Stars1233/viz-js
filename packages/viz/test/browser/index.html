<!doctype html>
<meta charset="utf8">

<link rel="stylesheet" href="npm:mocha/mocha.css">

<div id="mocha"></div>

<script type="module">

  import mocha from "mocha";
  import assert from "assert";
  import * as Viz from "@viz-js/viz";
  import DOMPurify from "dompurify";

  mocha.setup("bdd");

  describe("renderSVGElement", function() {
    let viz;

    beforeEach(async function() {
      viz = await Viz.instance();
    });

    it("works", async function() {
      assert.ok(viz.renderSVGElement("digraph { a -> b }"));
    });

    it("works with the images option", function() {
      const svg = viz.renderSVGElement("graph { a[image=\"test.png\"] }", {
        images: [
          { name: "test.png", width: 300, height: 200 }
        ]
      });

      assert.ok(svg);

      const image = svg.querySelector("image");

      assert.equal(image.getAttributeNS("http://www.w3.org/1999/xlink", "href"), "test.png");
      assert.equal(image.getAttribute("width"), "300px");
      assert.equal(image.getAttribute("height"), "200px");
    });

    describe("trusted type policy", function() {
      it("uses a trusted type policy if present", function() {
        let wasFakeSanitized = false;

        const fakePolicy = trustedTypes.createPolicy("fake", {
          createHTML(input) {
            wasFakeSanitized = true;
            return input;
          }
        });

        viz.renderSVGElement("digraph { a -> b }", { trustedTypePolicy: fakePolicy });

        assert.ok(wasFakeSanitized);
      });

      it("works with DOMPurify", function() {
        const trustedTypePolicy = trustedTypes.createPolicy("purify", {
          createHTML(input) {
            return DOMPurify.sanitize(input, {
              RETURN_TRUSTED_TYPE: false,
              USE_PROFILES: { svg: true }
            });
          }
        });

        const src = `graph { a[href="javascript:alert(1)"] }`;

        const dirty = viz.renderSVGElement(src);
        const clean = viz.renderSVGElement(src, { trustedTypePolicy });

        assert.equal(dirty.querySelector("a").getAttributeNS("http://www.w3.org/1999/xlink", "href"), "javascript:alert(1)");
        assert.equal(clean.querySelector("a").getAttributeNS("http://www.w3.org/1999/xlink", "href"), null);
      });
    });
  });

  mocha.run();

</script>
